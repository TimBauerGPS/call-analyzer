[build]
  command = "node -e \"console.log('VITE_SUPABASE_URL:', process.env.VITE_SUPABASE_URL ? 'SET ✓' : 'MISSING ✗'); console.log('VITE_SUPABASE_ANON_KEY:', process.env.VITE_SUPABASE_ANON_KEY ? 'SET ✓' : 'MISSING ✗');\" && npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  # The Supabase anon key is Supabase's *public* browser key (eyJ... JWT format).
  # It is intentionally embedded in the Vite bundle — this is expected and safe.
  # Security is enforced by Supabase RLS policies, not by keeping this key secret.
  # Disable Netlify's secrets scanner for this project so it doesn't block deploys.
  SECRETS_SCAN_ENABLED = "false"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
